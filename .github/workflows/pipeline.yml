name: Full CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc mlflow

      - name: Pull data using 
        run: |
         run: echo " simulate dvc "
         mkdir -p data
        
      - name: Train and log to MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python train.py

      - name: Save model info
        run: |
          echo $MLFLOW_RUN_ID > model_info.txt
          cat model_info.txt

      - name: Upload model info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mlflow

      - name: Download model info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check model threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python check_threshold.py

      - name: Mock Docker build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
          docker build --build-arg RUN_ID=$(cat model_info.txt) -t ml-model .
