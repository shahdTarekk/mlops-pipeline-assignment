name: ML Validation and Deployment
on:
 push:
  branches: [main] 
jobs:
 validate:
  runs-on: ubuntu-latest 
  steps:
   - name: checkout code 
     uses: actions/checkout@v4
   - name: setup
     uses: actions/setup-python@v5
     with: 
      python-version: "3.10"
   - name: install dependncy 
     run: |
      pip install -r requirements.txt
      pip install dvc mlflow
   - name: Pull data with DVC
     run: |
          echo "Simulating dvc pull"
          mkdir -p data
   - name: train and log
     env:
       MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
     run: python train.py 
   - name: save mlflow 
     run: |
      echo $MLFLOW_RUN_ID >model_info.txt

   - name: upload artifacts 
     uses: actions/uplaod-articat@v4
     with:
      name: model-info
      path: model_info.txt 
 deploy:
    runs-on: ubuntu-latest
    needs: validate 
    steps:
      - name: checkout code 
        uses: actions/checkout@v4
      - name: setup
        uses: actions/setup-python@v5
        with: 
          python-version: "3.10"
      - name: install dependncy 
        run: |
          pip install -r requirements.txt
          pip install dvc mlflow
      - name: download 
        uses: actions/download-artifacts@v4
        with:
         name: model-info

      - name: check 
        env:
         MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI}}
        run: python check_threshold.py
      - name: train mock 
        run: |
         echo "Building Docker image for Run ID: : $(cat.model_info.txt)"
         
        
  
  
     
     
    
